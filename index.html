<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>naStudia {olimpiady}</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Young+Serif&display=swap" rel="stylesheet">
</head>
<body class="scroll-locked">
    <nav class="top-nav">
        <img id="logo" src="img/logo.svg" alt="logo naStudia" />
    </nav>

    <header id="hero">
        <div class="container hero-content">
            
            <div id="hero-text-wrapper" class="blurred-state">
                <p class="font-decorated">
                    <span class="highlight">Strategia</span><br/>
                    <span id="hero-subtitle-dynamic">zamiast stresu</span>
                </h2>
                <p id="hero-desc-dynamic">
                    Wybierz swoją ścieżkę, aby odkodować odpowiednią strategię.
                </p>
            </div>

            <div class="user-toggle-container">
                <input type="radio" id="role-student" name="user-role" value="student">
                <label for="role-student" class="toggle-option">
                    <span class="icon">🎓</span>
                    <span class="text">JESTEM UCZNIEM</span>
                </label>

                <input type="radio" id="role-parent" name="user-role" value="parent">
                <label for="role-parent" class="toggle-option">
                    <span class="icon">👔</span>
                    <span class="text">JESTEM RODZICEM</span>
                </label>

                <div class="toggle-slider"></div>
            </div>

            <div id="scroll-indicator" class="hidden">
                <span class="mouse-icon"></span>
                <span class="arrow-down"></span>
            </div>

        </div>
    </header>

    <main id="dynamic-content">
        </main>

    <footer id="main-footer">
        <div class="container footer-content">
            <p class="footer-slogan">Nie ciężej. Mądrzej.</p>
            
            <div class="social-links">
                <a href="https://www.facebook.com/profile.php?id=61579491373902&locale=pl_PL" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                    </svg>
                </a>
                
                <a href="https://www.instagram.com/nastudia.pl" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                
                <a href="mailto:nastudia@proton.me" class="social-icon" aria-label="E-mail">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </a>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
